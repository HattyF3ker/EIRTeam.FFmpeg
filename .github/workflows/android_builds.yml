name: 🏁 FFmpeg Android Builds

on:
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: string
      artifact-name:
        required: true
        type: string

env:
  GODOT_BASE_BRANCH: master
  FFMPEG_CONFIGURE_FLAGS: >
    --disable-iconv
    --disable-encoder=libmp3lame
    --disable-decoder=libmp3lame
    --disable-muxer=mp3
    --disable-demuxer=mp3
    --disable-parser=mp3

concurrency:
  cancel-in-progress: true
  group: ci-${{github.actor}}-${{github.head_ref || github.run_number}}-${{github.ref}}-android-${{ inputs.target }}

jobs:
  build-android:
    runs-on: ubuntu-22.04
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android armv7a (32-bit) - ${{ inputs.target }}
            arch: armv7a
            toolchain_prefix: armv7a-linux-androideabi
          - name: Android arm64-v8a (64-bit) - ${{ inputs.target }}
            arch: arm64-v8a
            toolchain_prefix: aarch64-linux-android

    steps:
      - name: Checkout EIRTeam/FFmpeg-Builds (scripts)
        uses: actions/checkout@v3
        with:
          repository: EIRTeam/FFmpeg-Builds
          path: ffmpeg-builds
          ref: master

      - name: Setup Python and build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            make \
            yasm \
            pkg-config \
            python3 \
            python3-pip \
            wget \
            unzip
          pip3 install packaging  # requerido por el script de versión

      - name: Download and Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
          unzip -q android-ndk-r23c-linux.zip
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r23c" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/android-ndk-r23c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build FFmpeg for ${{ matrix.arch }}
        working-directory: ffmpeg-builds
        run: |
          export FFMPEG_CONFIGURE_FLAGS="${{ env.FFMPEG_CONFIGURE_FLAGS }}"
          bash scripts/android.sh --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-${{ matrix.arch }}
          path: ffmpeg-builds/build/android/${{ matrix.arch }}/
